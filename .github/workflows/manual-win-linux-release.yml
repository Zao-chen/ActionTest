name: Manual Build+Package+Release (Win+Linux)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (example: v1.0.0)"
        required: true
      qt_version:
        description: "Qt version"
        required: false
        default: "6.6.0"
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ===== deps =====
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev patchelf desktop-file-utils

      - name: Setup Ninja (Windows)
        if: matrix.os == 'windows-latest'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # ===== Qt =====
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ inputs.qt_version }}
          target: desktop
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2019_64' || 'gcc_64' }}
          cache: true

      # ===== build =====
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}

      - name: Build
        run: cmake --build build

      # ===== package (Windows) =====
      - name: Package Windows (windeployqt)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if(!(Test-Path "build\ActionTest.exe")){ throw "Not found: build\ActionTest.exe" }
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build\ActionTest.exe dist\
          windeployqt dist\ActionTest.exe
          Compress-Archive -Path dist\* -DestinationPath ActionTest-${{ inputs.tag_name }}-windows.zip

      # ===== package (Linux) =====
      - name: Package Linux (AppImage via linuxdeployqt)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euxo pipefail
          if [ ! -f "build/ActionTest" ]; then
            echo "Not found: build/ActionTest"
            ls -la build || true
            exit 1
          fi

          #AppDir layout
          rm -rf AppDir linuxdeployqt.AppImage squashfs-root dist || true
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps dist
          cp build/ActionTest AppDir/usr/bin/ActionTest
          chmod +x AppDir/usr/bin/ActionTest

          #desktop file
          cat > AppDir/usr/share/applications/ActionTest.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ActionTest
          Exec=ActionTest
          Icon=ActionTest
          Categories=Utility;
          Terminal=false
          EOF

          #tiny png icon (1x1) just to satisfy tool
          base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/ActionTest.png <<'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+X2m0AAAAASUVORK5CYII=
          EOF

          #download linuxdeployqt AppImage and extract (avoid FUSE)
          wget -qO linuxdeployqt.AppImage https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage
          ./linuxdeployqt.AppImage --appimage-extract

          #build AppImage
          ./squashfs-root/AppRun AppDir/usr/share/applications/ActionTest.desktop -appimage
          ls -la ./*.AppImage

          mv ./*.AppImage dist/ActionTest-${{ inputs.tag_name }}-linux-x86_64.AppImage

      # ===== upload artifacts =====
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.os }}
          path: |
            ActionTest-${{ inputs.tag_name }}-windows.zip
            dist/ActionTest-${{ inputs.tag_name }}-linux-x86_64.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |
            release_assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
