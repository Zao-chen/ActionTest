name: Manual Build+Package+Release (Win+Linux)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (example: v1.0.0)"
        required: true
      qt_version:
        description: "Qt version"
        required: false
        default: "6.6.0"
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-22.04]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      #========================
      # Linux deps (Qt xcb + AppImage)
      #========================
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build wget patchelf desktop-file-utils \
            libgl1-mesa-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-randr0 libxcb-xinerama0 libxcb-xfixes0 libxcb-shape0

      #========================
      # Windows toolchain
      #========================
      - name: Setup Ninja (Windows)
        if: matrix.os == 'windows-latest'
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      #========================
      # Install Qt
      #========================
      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ inputs.qt_version }}
          target: desktop
          arch: ${{ matrix.os == 'windows-latest' && 'win64_msvc2019_64' || 'gcc_64' }}
          cache: true

      #========================
      # Build
      #========================
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ inputs.build_type }}

      - name: Build
        run: cmake --build build

      #========================
      # Package Windows (windeployqt + Inno Setup)
      #========================
      - name: Package Windows (windeployqt)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if(!(Test-Path "build\ActionTest.exe")){ throw "Not found: build\ActionTest.exe" }

          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force dist | Out-Null

          Copy-Item build\ActionTest.exe dist\
          windeployqt dist\ActionTest.exe

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /?

      - name: Build Installer (Inno Setup)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver="${{ inputs.tag_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion=$ver `
            "installer\ActionTest.iss"

          if(!(Test-Path "installer\output\ActionTestSetup.exe")){ throw "Not found: installer\output\ActionTestSetup.exe" }
          Move-Item "installer\output\ActionTestSetup.exe" "ActionTest-${{ inputs.tag_name }}-setup.exe" -Force

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-windows
          path: ActionTest-${{ inputs.tag_name }}-setup.exe

      #========================
      # Package Linux (AppImage via linuxdeployqt)
      #========================
      - name: Package Linux (AppImage via linuxdeployqt)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          set -euxo pipefail

          if [ ! -f "build/ActionTest" ]; then
            echo "Not found: build/ActionTest"
            ls -la build || true
            exit 1
          fi

          rm -rf AppDir linuxdeployqt.AppImage squashfs-root dist || true
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps dist

          cp build/ActionTest AppDir/usr/bin/ActionTest
          chmod +x AppDir/usr/bin/ActionTest

          cat > AppDir/usr/share/applications/ActionTest.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=ActionTest
          Exec=ActionTest
          Icon=ActionTest
          Categories=Utility;
          Terminal=false
          EOF

          base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/ActionTest.png <<'EOF'
          iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+X2m0AAAAASUVORK5CYII=
          EOF

          wget -qO linuxdeployqt.AppImage https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage
          chmod +x linuxdeployqt.AppImage
          ./linuxdeployqt.AppImage --appimage-extract

          ./squashfs-root/AppRun AppDir/usr/share/applications/ActionTest.desktop -appimage

          OUT_APPIMAGE="$(ls -1 ActionTest-*.AppImage | head -n 1)"
          echo "OUT_APPIMAGE=$OUT_APPIMAGE"
          mv "$OUT_APPIMAGE" "dist/ActionTest-${{ inputs.tag_name }}-linux-x86_64.AppImage"

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: pkg-linux
          path: dist/ActionTest-${{ inputs.tag_name }}-linux-x86_64.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          files: |
            release_assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
