name: Qt6 CMake Windows (MSVC)

on:
  push:
  pull_request:
  workflow_dispatch: #手动触发
    inputs:
      qt_version:
        description: "Qt version"
        required: false
        default: "6.6.0"
      build_type:
        description: "CMake build type"
        required: false
        default: "Release"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: ${{ inputs.qt_version || '6.6.0' }}
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          cache: true

      - name: Configure (CMake)
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=${{ inputs.build_type || 'Release' }}

      - name: Build
        run: cmake --build build --config ${{ inputs.build_type || 'Release' }}

      #如果你有 ctest
      # - name: Test
      #   run: ctest --test-dir build -C ${{ inputs.build_type || 'Release' }} --output-on-failure
